<style>
  :root {
    --arth-cream:   #FBF4EC;
    --arth-cream2:  #F4E0CC;
    --arth-peach:   #FFD7B5;
    --arth-coral:   #F08A5D;
    --arth-rose:    #F3A6B0;
    --arth-pink:    #E58AA0;
    --arth-lav:     #C9B8E0;
    --arth-mauve:   #7B5A8C;
    --arth-mint:    #BFE3D7;
    --arth-amber:   #FFB86B;
    --arth-plum:    #2A1B2C;
    --arth-plum2:   #3B2446;
    --arth-ink:     #1F1228;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: linear-gradient(180deg, #5A4267 0%, #8E6F8F 35%, #C9A4B5 70%, #E8C8C8 100%);
    font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, sans-serif;
    color: var(--arth-cream);

  canvas { display: block; }

  /* ---------- Title banner ---------- */
  #title-banner {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 20; pointer-events: none;
    font-family: 'Fraunces', Georgia, serif;
  }
  #title-banner .name {
    font-size: 30px; font-weight: 700;
    color: var(--arth-cream);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 18px rgba(240,138,93,0.55), 0 0 28px rgba(243,166,176,0.3);

  #title-banner .tag {
    font-size: 13px; font-style: italic; letter-spacing: 0.06em;
    color: rgba(251,244,236,0.78);
    margin-top: 2px;
  }
  #title-banner .brand {
    display: inline-block; margin-top: 2px;
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--arth-coral);
  }

  /* ---------- Controls ---------- */
  #controls-hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(251,244,236,0.85); font-size: 13px; z-index: 20;
    background: rgba(31,18,40,0.55); padding: 8px 18px; border-radius: 999px;
    backdrop-filter: blur(8px);

  #controls-hint kbd {
    background: rgba(255,244,234,0.12); padding: 2px 8px; border-radius: 5px;

    font-family: 'Inter', sans-serif; font-size: 11px;
    color: var(--arth-cream);
  }

  /* ---------- Minimap ---------- */

    position: fixed; bottom: 20px; right: 20px; width: 168px; height: 168px;
    background: rgba(31,18,40,0.55);
    border: 1px solid rgba(214,168,90,0.45);
    border-radius: 14px; z-index: 20; backdrop-filter: blur(10px);
    padding: 6px;
    box-shadow: 0 12px 32px -10px rgba(0,0,0,0.4);
  }
  #minimap .label {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--arth-coral); font-weight: 700;
  }

  /* ---------- Proximity indicator ---------- */

    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    color: var(--arth-cream); font-size: 13px; z-index: 20;

    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    transform: translate(-50%, 8px);
    font-weight: 600; letter-spacing: 0.02em;
  }
  #proximity-indicator.visible { opacity: 1; transform: translate(-50%, 0); }
  #proximity-indicator kbd {
    background: rgba(255,255,255,0.22); padding: 2px 7px; border-radius: 4px;
    margin: 0 3px; font-family: inherit; font-size: 11px;

  /* ---------- Info panel (Arth-branded) ---------- */

    border: 1px solid rgba(42,27,44,0.12);
    border-radius: 22px; padding: 0;

/* ============================================================
 * ARTH PARTY — low-poly walking world
 * (structure adapted from the Disney princess world demo)

/* ---------- Scene + camera + renderer ---------- */
const scene = new THREE.Scene();
// Soft dusk: muted mauve drifting toward dusty lavender at the horizon.
scene.background = new THREE.Color(0xA9879D);
scene.fog = new THREE.FogExp2(0xA9879D, 0.0055);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 35, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

/* ---------- Lighting (soft dusk event) ---------- */
const ambient = new THREE.AmbientLight(0xFFE7C2, 0.62);
scene.add(ambient);

// Hemisphere: dusty mauve sky + warm beige ground bounce.
const hemi = new THREE.HemisphereLight(0xC9B4D4, 0xE5D4B8, 0.55);
scene.add(hemi);

const keyLight = new THREE.DirectionalLight(0xFFD7A8, 0.9);
keyLight.position.set(-30, 50, 20);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 200;
keyLight.shadow.camera.left = -80;
keyLight.shadow.camera.right = 80;
keyLight.shadow.camera.top = 80;
keyLight.shadow.camera.bottom = -80;
scene.add(keyLight);

// Warmer rim from the opposite side for sunset feel.
const rimLight = new THREE.DirectionalLight(0xF3A6B0, 0.4);
rimLight.position.set(30, 30, -20);
scene.add(rimLight);

const warmFill = new THREE.PointLight(0xF08A5D, 0.55, 90);
warmFill.position.set(0, 18, 0);
scene.add(warmFill);

/* ---------- Helper: low-poly block ---------- */
function block(w, h, d, color, x, y, z, opts = {}) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({
    color,
    emissive: opts.emissive || 0,
    emissiveIntensity: opts.emissiveIntensity || 0,
    transparent: !!opts.opacity,
    opacity: opts.opacity != null ? opts.opacity : 1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

/* ---------- Canvas-text sign helper ---------- */
function makeSignTexture(lines, opts = {}) {
  const W = opts.W || 768;
  const H = opts.H || 256;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  // bg
  if (opts.bg) {
    ctx.fillStyle = opts.bg;
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.clearRect(0, 0, W, H);
  }
  // border
  if (opts.border) {
    ctx.strokeStyle = opts.border;
    ctx.lineWidth = opts.borderWidth || 6;
    ctx.strokeRect(8, 8, W - 16, H - 16);
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const totalLines = lines.length;
  lines.forEach((line, i) => {
    ctx.font = `${line.weight || 700} ${line.size || 60}px ${line.font || '"Fraunces", Georgia, serif'}`;
    ctx.fillStyle = line.color || '#2A1B2C';
    const y = (H / (totalLines + 1)) * (i + 1);
    ctx.fillText(line.text, W / 2, y);
  });
  const tex = new THREE.CanvasTexture(canvas);
  tex.encoding = THREE.sRGBEncoding;
  tex.needsUpdate = true;
  return tex;
}

function makeSignPanel(lines, w, h, opts = {}) {
  const tex = makeSignTexture(lines, opts);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: !!opts.transparent });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.castShadow = false;
  mesh.receiveShadow = false;
  return mesh;
}

/* ============================================================
 * GROUND — modular event floor with concentric ring patterns
 *   - Outer park: warm light beige
 *   - Plaza ring: slightly darker blush-beige
 *   - Inner stage: warm cream with a couple of accent rings
 * ============================================================ */
const groundGroup = new THREE.Group();

// Outer warm beige park (extends to the horizon)
const baseFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(280, 280, 1, 1),
  new THREE.MeshLambertMaterial({ color: 0xE5D4B8 })
);
baseFloor.rotation.x = -Math.PI / 2;
baseFloor.receiveShadow = true;
groundGroup.add(baseFloor);

// Mid plaza disc — slightly darker blush-beige ring band
const plazaDisc = new THREE.Mesh(
  new THREE.CircleGeometry(48, 64),
  new THREE.MeshLambertMaterial({ color: 0xDCC4A6 })
);
plazaDisc.rotation.x = -Math.PI / 2;
plazaDisc.position.y = 0.012;
plazaDisc.receiveShadow = true;
groundGroup.add(plazaDisc);

// Inner stage — warm cream
const innerStage = new THREE.Mesh(
  new THREE.CircleGeometry(34, 64),
  new THREE.MeshLambertMaterial({ color: 0xF2E0C8 })
);
innerStage.rotation.x = -Math.PI / 2;
innerStage.position.y = 0.018;
innerStage.receiveShadow = true;
groundGroup.add(innerStage);

// Soft border between park and plaza
const plazaEdge = new THREE.Mesh(
  new THREE.RingGeometry(47.6, 48.0, 96),
  new THREE.MeshBasicMaterial({ color: 0xC8A98C, transparent: true, opacity: 0.85 })
);
plazaEdge.rotation.x = -Math.PI / 2;
plazaEdge.position.y = 0.022;
groundGroup.add(plazaEdge);

// Concentric ring patterns rippling out from the central installation
function addRing(rInner, rOuter, color, opacity = 0.85) {
  const r = new THREE.Mesh(
    new THREE.RingGeometry(rInner, rOuter, 96),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity })
  );
  r.rotation.x = -Math.PI / 2;
  r.position.y = 0.024;
  groundGroup.add(r);
}
addRing(13.5, 13.8, 0xF08A5D, 0.85);   // closer coral ring
addRing(21.0, 21.3, 0xE8A87C, 0.7);    // mid peach ring
addRing(32.0, 32.3, 0xD79680, 0.55);   // outer warm-coral ring (just inside booths)

scene.add(groundGroup);

/* ---------- Radial coral paths from plaza to each booth ---------- */
function createPath(x1, z1, x2, z2, width) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx * dx + dz * dz);
  const angle = Math.atan2(dx, dz);
  // walkway main slab — saturated peach
  const path = block(width, 0.12, len, 0xF2A878, (x1 + x2) / 2, 0.045, (z1 + z2) / 2);
  path.rotation.y = angle;
  path.material = new THREE.MeshLambertMaterial({ color: 0xF2A878 });
  path.castShadow = false;
  path.receiveShadow = true;
  groundGroup.add(path);
  // darker border on each side — readable walkway
  const borderColor = 0xC97D58;
  const borderL = block(0.18, 0.05, len + 0.4, borderColor, (x1 + x2) / 2, 0.052, (z1 + z2) / 2);
  borderL.rotation.y = angle;
  borderL.material = new THREE.MeshBasicMaterial({ color: borderColor });
  borderL.translateX(width / 2);
  groundGroup.add(borderL);

function buildArch(w, h, depth, color) {
  const g = new THREE.Group();

// --- Plaza ring: 5 planters in a clean symmetric layout, placed in
//     the gaps between path angles so they never overlap the walkways.
const pathAngles = BOOTHS.map((b) => Math.atan2(b.position.x, b.position.z));
const sortedPathAngles = [...pathAngles].sort((a, b) => a - b);
for (let i = 0; i < sortedPathAngles.length; i++) {
  const a1 = sortedPathAngles[i];
  const a2 = sortedPathAngles[(i + 1) % sortedPathAngles.length];
  let mid = (a1 + a2) / 2;
  // wrap if the gap straddles the +/-PI boundary
  if (a2 < a1) mid = (a1 + a2 + Math.PI * 2) / 2;
  const r = 11.5;
  makePlanter(Math.sin(mid) * r, Math.cos(mid) * r);
}

// --- Path-start lamp markers right where each path leaves the medallion.
BOOTHS.forEach((b) => {
  const ang = Math.atan2(b.position.x, b.position.z);
  // a pair of lamps flanking the start of each path
  const startR = 11.6;
  const offX = Math.cos(ang) * 3.0;
  const offZ = -Math.sin(ang) * 3.0;
  const sx = Math.sin(ang) * startR;
  const sz = Math.cos(ang) * startR;
  makeLamp(sx + offX * 0.6, sz + offZ * 0.6);
  makeLamp(sx - offX * 0.6, sz - offZ * 0.6);
});

// --- Event lamps spaced along each path.
BOOTHS.forEach((b) => {
  for (let t = 0.36; t < 1; t += 0.32) {
    const lx = b.position.x * t;
    const lz = b.position.z * t;
    const ang = Math.atan2(b.position.x, b.position.z);
    const offX = Math.cos(ang) * 2.8;
    const offZ = -Math.sin(ang) * 2.8;
    makeLamp(lx + offX, lz + offZ);
    makeLamp(lx - offX, lz - offZ);
  }
});

// --- Planters mid-way along each path on both sides for a guided walkway feel.
BOOTHS.forEach((b) => {
  const t = 0.55;
  const lx = b.position.x * t;
  const lz = b.position.z * t;
  const ang = Math.atan2(b.position.x, b.position.z);
  const offX = Math.cos(ang) * 3.8;
  const offZ = -Math.sin(ang) * 3.8;
  makePlanter(lx + offX, lz + offZ);
  makePlanter(lx - offX, lz - offZ);
});

// Skip-zones: don't spawn trees too close to the central plaza or to a booth.
function isClearOfBooths(x, z, minR) {
  if (Math.hypot(x, z) < 14) return false; // central plaza buffer
  for (const b of BOOTHS) {
    if (Math.hypot(x - b.position.x, z - b.position.z) < minR) return false;
  }
  return true;
}

// Sky fairy-light strands criss-crossing high above the plaza
const fairyLights = [];
function createSkyStrand(from, to, count, color) {
  const a = new THREE.Vector3(...from);
  const b = new THREE.Vector3(...to);

  // 1. Build the sagging curve points
  const points = [];
  for (let i = 0; i < count; i++) {
    const t = i / (count - 1);
    const p = new THREE.Vector3().lerpVectors(a, b, t);
    p.y -= Math.sin(t * Math.PI) * 1.6; // sag in the middle
    points.push(p);
  }

  // 2. Visible wire — thin TubeGeometry along the same curve
  const curve = new THREE.CatmullRomCurve3(points);
  const tubeGeom = new THREE.TubeGeometry(curve, count * 3, 0.025, 6, false);
  const wireMat = new THREE.MeshBasicMaterial({ color: 0x1F0E2A });
  const wire = new THREE.Mesh(tubeGeom, wireMat);
  scene.add(wire);

  // 3. Bulbs at each point along the wire
  points.forEach((p) => {
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 8, 6),
      new THREE.MeshBasicMaterial({ color })
    );
    bulb.position.copy(p);
    bulb.userData.basePhase = Math.random() * Math.PI * 2;
    scene.add(bulb);
    fairyLights.push(bulb);
  });
}

/* ============================================================
 * CONTROLS
 * ============================================================ */
const keys = {};
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Escape') e.preventDefault();
  if (e.key === ' ') handleInteract();
  if (e.key === 'Escape') closePanel();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

let panelOpen = false;
let nearbyBooth = null;

function handleInteract() {
  if (panelOpen) { closePanel(); return; }
  if (nearbyBooth !== null) openPanel(nearbyBooth);
}

function openPanel(index) {
  const lm = BOOTHS[index];
  const panel = document.getElementById('info-panel');
  panel.style.borderColor = lm.accent;
  panel.style.setProperty('--accent', lm.accent);
  panel.style.setProperty('--accent-soft', lm.accentSoft);

  document.getElementById('panel-eyebrow').textContent = lm.eyebrow;
  document.getElementById('panel-title').textContent = lm.name;
  document.getElementById('panel-subtitle').textContent = lm.subtitle;

  let bodyHTML = '';
  lm.sections.forEach((s) => {
    bodyHTML += `<div class="info-section"><h3>${s.title}</h3>${s.content}</div>`;
  });
  if (lm.tags) {
    bodyHTML += '<div class="tag-row">';
    lm.tags.forEach((t) => { bodyHTML += `<span class="tag">${t}</span>`; });
    bodyHTML += '</div>';
  }
  bodyHTML += `<button class="next-step" id="next-step-btn">${lm.nextLabel || 'Next step →'}</button>`;
  document.getElementById('panel-body').innerHTML = bodyHTML;

  const btn = document.getElementById('next-step-btn');
  if (btn) btn.addEventListener('click', closePanel);

  panel.classList.add('visible');
  panelOpen = true;
}

function closePanel() {
  const panel = document.getElementById('info-panel');
  panel.classList.remove('visible');
  panelOpen = false;
}
document.getElementById('panel-close').addEventListener('click', closePanel);

/* ============================================================
 * ANIMATION LOOP
 * ============================================================ */
let walkCycle = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  // ----- Player movement -----
  let moving = false;
  const moveDir = new THREE.Vector3(0, 0, 0);

  if (!panelOpen) {
    if (keys['ArrowUp']    || keys['w'] || keys['W']) { moveDir.z -= 1; moving = true; }
    if (keys['ArrowDown']  || keys['s'] || keys['S']) { moveDir.z += 1; moving = true; }
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) { moveDir.x -= 1; moving = true; }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) { moveDir.x += 1; moving = true; }
  }

  if (moving) {
    moveDir.normalize().multiplyScalar(playerSpeed);
    playerGroup.position.x += moveDir.x;
    playerGroup.position.z += moveDir.z;
    // clamp
    playerGroup.position.x = Math.max(-58, Math.min(58, playerGroup.position.x));
    playerGroup.position.z = Math.max(-58, Math.min(58, playerGroup.position.z));
    // face direction
    playerAngle = Math.atan2(moveDir.x, moveDir.z);
    playerGroup.rotation.y = playerAngle;
    // walk cycle
    walkCycle += dt * 8;
    leftArm.rotation.x = Math.sin(walkCycle) * 0.55;
    rightArm.rotation.x = -Math.sin(walkCycle) * 0.55;
    leftLeg.rotation.x = -Math.sin(walkCycle) * 0.42;
    rightLeg.rotation.x = Math.sin(walkCycle) * 0.42;
    playerGroup.position.y = Math.abs(Math.sin(walkCycle)) * 0.13;
  } else {
    leftArm.rotation.x *= 0.9;
    rightArm.rotation.x *= 0.9;
    leftLeg.rotation.x *= 0.9;
    rightLeg.rotation.x *= 0.9;
    playerGroup.position.y *= 0.9;
  }

  // ----- Camera follow (third-person, slightly behind & above) -----
  const camTarget = new THREE.Vector3(playerGroup.position.x, 0, playerGroup.position.z);
  const camOffset = new THREE.Vector3(0, 26, 24);
  const desiredCamPos = camTarget.clone().add(camOffset);
  camera.position.lerp(desiredCamPos, 0.06);
  const lookTarget = playerGroup.position.clone();
  lookTarget.y += 2;
  camera.lookAt(lookTarget);

  // ----- Proximity detection -----
  nearbyBooth = null;
  const proximityIndicator = document.getElementById('proximity-indicator');
  let minDist = Infinity;

  BOOTHS.forEach((b, i) => {
    const dx = playerGroup.position.x - b.position.x;
    const dz = playerGroup.position.z - b.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 12 && dist < minDist) {
      minDist = dist;
      nearbyBooth = i;
    }
  });

  if (nearbyBooth !== null && !panelOpen) {
    proximityIndicator.innerHTML = `<strong>${BOOTHS[nearbyBooth].name}</strong> · Press <kbd>Space</kbd> to explore`;
    proximityIndicator.classList.add('visible');
  } else {
    proximityIndicator.classList.remove('visible');
  }

  // ----- Animate booth lights pulsing -----
  boothLights.forEach((light, i) => {
    light.intensity = 1.1 + Math.sin(time * 1.6 + i * 1.2) * 0.35;
  });

  // ----- Animate central installation orb + halo -----
  centralInstallation.children.forEach((c) => {
    if (c.userData.isOrb) {
      c.scale.setScalar(1 + Math.sin(time * 1.4) * 0.06);
    }
    if (c.userData.isHalo) {
      c.rotation.z = time * 0.3;
      c.material.opacity = 0.55 + Math.sin(time * 1.3) * 0.2;
    }
    if (c.userData.isBillboard) {
      c.lookAt(camera.position);
    }
  });

  // ----- Animate booth-specific things -----
  builtBooths.forEach((booth, i) => {
    booth.children.forEach((child) => {
      if (child.userData.isMoon) {
        child.material.color.lerp(new THREE.Color(0xFFF1CC), 0.05);
      }
      if (child.userData.isStar) {
        child.position.y = 3.6 + Math.sin(time * 1.2 + child.userData.basePhase) * 0.18;
        child.rotation.y = time * 0.5;
      }
      if (child.userData.isFloatingNote) {
        child.position.y = child.userData.baseY + Math.sin(time * 1.1 + child.userData.basePhase) * 0.18;
        child.rotation.z = Math.sin(time * 0.7 + child.userData.basePhase) * 0.18;
      }
      if (child.userData.isLoadFill) {
        const w = 0.4 + (Math.sin(time * 1.5) + 1) * 1.0;
        child.scale.x = Math.max(0.05, w / 2);
        child.position.x = 2.5 - 1 + (w / 2);
      }
      if (child.userData.isFan) {
        child.rotation.y += dt * 4;
      }
    });
  });

  // ----- Animate attendees gentle sway -----
  attendees.forEach((a) => {
    a.rotation.y += Math.sin(time * 0.4 + a.userData.basePhase) * 0.0015;
  });

  // ----- Ribbon quotes float -----
  scene.children.forEach((c) => {
    if (c.userData && c.userData.isRibbon) {
      c.position.y = c.userData.baseY + Math.sin(time * 0.7 + c.userData.basePhase) * 0.12;
      c.lookAt(camera.position);
    }
  });

  // ----- Starfield slow rotation + twinkle -----
  stars.rotation.y += dt * 0.012;
  starMat.opacity = 0.7 + Math.sin(time * 0.5) * 0.18;

  // ----- Sky fairy lights twinkle -----
  fairyLights.forEach((b, i) => {
    const t = time * 1.6 + b.userData.basePhase;
    const v = 0.65 + (Math.sin(t) + 1) * 0.18;
    b.scale.setScalar(v);
  });

  // ----- Floating lanterns bob -----
  floatingLanterns.forEach((l) => {
    l.position.y = l.userData.baseY + Math.sin(time * 0.45 + l.userData.phase) * 0.6;
    if (l.userData.orb) {
      l.userData.orb.scale.setScalar(0.95 + Math.sin(time * 1.4 + l.userData.phase) * 0.1);
    }
  });

  // ----- Minimap -----
  drawMinimap();

  renderer.render(scene, camera);
}

/* ============================================================
 * MINIMAP (Arth colors, 5 booths)
 * ============================================================ */
const minimapCanvas = document.getElementById('minimap-render');
const mCtx = minimapCanvas.getContext('2d');
const MAP_RANGE = 70; // world span shown
const MAP_SIZE = 156;

function worldToMap(wx, wz) {
  return {
    x: ((wx + MAP_RANGE) / (MAP_RANGE * 2)) * MAP_SIZE,
    y: ((wz + MAP_RANGE) / (MAP_RANGE * 2)) * MAP_SIZE,
  };
}

function drawMinimap() {
  const ctx = mCtx;
  ctx.clearRect(0, 0, MAP_SIZE, MAP_SIZE);

  // bg
  const grad = ctx.createRadialGradient(MAP_SIZE / 2, MAP_SIZE / 2, 10, MAP_SIZE / 2, MAP_SIZE / 2, MAP_SIZE / 2);
  grad.addColorStop(0, '#FBE2C2');
  grad.addColorStop(0.7, '#F4E0CC');
  grad.addColorStop(1, '#3B2446');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

  // plaza ring
  const center = worldToMap(0, 0);
  ctx.strokeStyle = 'rgba(240,138,93,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(center.x, center.y, 14, 0, Math.PI * 2);
  ctx.stroke();

  // paths
  ctx.strokeStyle = 'rgba(255,179,107,0.55)';
  ctx.lineWidth = 2.4;
  BOOTHS.forEach((b) => {
    const to = worldToMap(b.position.x, b.position.z);
    ctx.beginPath();
    ctx.moveTo(center.x, center.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  });

  // booth dots + labels
  BOOTHS.forEach((b) => {
    const pos = worldToMap(b.position.x, b.position.z);
    const hex = '#' + b.color.toString(16).padStart(6, '0');
    ctx.fillStyle = hex;
    ctx.shadowColor = hex;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // label
    ctx.fillStyle = '#2A1B2C';
    ctx.font = 'bold 8px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(b.short, pos.x, pos.y + 14);
  });

  // player
  const playerPos = worldToMap(playerGroup.position.x, playerGroup.position.z);
  ctx.fillStyle = '#FBF4EC';
  ctx.shadowColor = '#FBF4EC';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(playerPos.x, playerPos.y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // direction indicator
  const dirX = Math.sin(playerAngle) * 9;
  const dirY = -Math.cos(playerAngle) * 9;
  ctx.strokeStyle = '#F08A5D';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(playerPos.x, playerPos.y);
  ctx.lineTo(playerPos.x + dirX, playerPos.y - dirY);
  ctx.stroke();
}

/* ============================================================
 * RESIZE + LOADING
 * ============================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let loadProgress = 0;
const loadingFill = document.getElementById('loading-fill');
const loadInterval = setInterval(() => {
  loadProgress += Math.random() * 28;
  if (loadProgress >= 100) {
    loadProgress = 100;
    loadingFill.style.width = '100%';
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('fade-out');
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
      }, 800);
    }, 400);
  }
  loadingFill.style.width = loadProgress + '%';
}, 150);

animate();
